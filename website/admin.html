<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Smart Gym</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="admin-body">
    <div class="sidebar">
        <div class="logo">ADMIN<span>PANEL</span></div>
        <nav>
            <div class="nav-item active" onclick="loadTab('members', this)"><i class="fas fa-users"></i> Hội viên</div>
            <div class="nav-item" onclick="loadTab('packages', this)"><i class="fas fa-tags"></i> Gói tập</div>
            <div class="nav-item" onclick="loadTab('history', this)"><i class="fas fa-history"></i> Lịch sử</div>
            <div class="nav-item" style="margin-top: 50px; color: #ff3e3e;" onclick="logout()"><i
                    class="fas fa-sign-out-alt"></i> Đăng xuất</div>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1 id="tabTitle">Quản lý Hội viên</h1>
            <div class="user-badge">Admin: <span id="adminName"></span></div>
        </header>
        <div class="search-bar mb-3" style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="searchInput" onkeyup="searchTable()"
                placeholder="🔍 Tìm hội viên theo tên hoặc username..."
                style="flex: 1; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white;">
        </div>
        <div id="tableContainer" class="card">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="packageModal" class="modal-overlay" style="display: none;">
        <div class="login-box modal-box">
            <h2 id="modalTitle">THÊM GÓI TẬP</h2>
            <input type="hidden" id="packageId">
            <input type="text" id="packageName" placeholder="Tên gói tập">
            <input type="number" id="packagePrice" placeholder="Giá tiền (VNĐ)">
            <input type="number" id="packageDays" placeholder="Số ngày sử dụng">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="savePackage()" class="btn-full">LƯU</button>
                <button onclick="closeModal('packageModal')" class="btn-full" style="background: #334155;">HỦY</button>
            </div>
        </div>
    </div>

    <div id="subscribeModal" class="modal-overlay" style="display: none;">
        <div class="login-box modal-box">
            <h2>ĐĂNG KÝ GÓI TẬP</h2>
            <p id="subMemberName" style="color: #38bdf8; font-weight: bold; margin-bottom: 15px;"></p>
            <input type="hidden" id="subUserId">
            <select id="subPackageSelect"
                style="width: 100%; padding: 12px; background: #0f172a; color: white; border: 1px solid #334155; border-radius: 8px; margin-bottom: 20px;">
            </select>
            <div style="display: flex; gap: 10px;">
                <button onclick="confirmSubscribe()" class="btn-full">KÍCH HOẠT</button>
                <button onclick="closeModal('subscribeModal')" class="btn-full"
                    style="background: #334155;">HỦY</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_URL = "https://api.thanhchinh.io.vn/api";
        document.getElementById('adminName').innerText = localStorage.getItem('userName') || "Admin";

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function loadTab(type, element) {
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            const tabTitle = document.getElementById('tabTitle');

            if (element) {
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                element.classList.add('active');
            }

            let endpoint = type === 'members' ? '/Users' : (type === 'packages' ? '/GymPackage' : '/Rfid/history');

            if (type === 'members') {
                tabTitle.innerText = "Quản lý Hội viên";
                tableHead.innerHTML = `<tr><th>Họ tên</th><th>Username</th><th>Thẻ RFID</th><th>Gói tập hiện tại</th><th>Trạng thái</th><th>Thao tác</th></tr>`;
            } else if (type === 'packages') {
                tabTitle.innerText = "Quản lý Gói tập";
                tableHead.innerHTML = `<tr><th>Tên gói</th><th>Giá tiền</th><th>Thời hạn</th><th>Thao tác <button onclick="openPackageModal()" style="padding:2px 8px; cursor:pointer; background:#38bdf8; border:none; border-radius:4px; color:#000;">+</button></th></tr>`;
            } else {
                tabTitle.innerText = "Lịch sử Check-in";
                tableHead.innerHTML = `<tr><th>Thời gian</th><th>Hội viên</th><th>Mã thẻ</th><th>Kết quả</th></tr>`;
            }

            try {
                const res = await axios.get(`${API_URL}${endpoint}`);
                let html = "";
                res.data.forEach(item => {
                    if (type === 'members') {
                        const packageInfo = item.activePackage
                            ? `<span style="color: #38bdf8;"><i class="fas fa-check-circle"></i> ${item.activePackage.packageName}</span><br><small style="color:#888;">Hết hạn: ${new Date(item.activePackage.expiryDate).toLocaleDateString('vi-VN')}</small>`
                            : `<span style="color: #ef4444;"><i class="fas fa-times-circle"></i> Chưa đăng ký</span>`;

                        html += `<tr>
                            <td>${item.fullName}</td>
                            <td>${item.username}</td>
                            <td><code>${item.rfidCardGuid || 'Chưa gán'}</code></td>
                            <td>${packageInfo}</td>
                            <td onclick="toggleUser(${item.id})" style="cursor:pointer;" title="Click để thay đổi">
                                <span class="${item.isActive ? 'status-valid' : 'status-invalid'}">${item.isActive ? '● Active' : '● Locked'}</span>
                            </td>
                            <td>
                                <button class="btn-edit-table" onclick="openSubscribeModal(${item.id}, '${item.fullName}')"><i class="fas fa-plus-circle"></i> Gán</button>
                                ${item.activePackage ? `<button class="btn-delete-table" onclick="cancelSubscription(${item.id})" title="Hủy gói tập"><i class="fas fa-ban"></i> Hủy</button>` : ''}
                            </td>
                        </tr>`;
                    } else if (type === 'packages') {
                        html += `<tr>
                            <td>${item.name}</td>
                            <td>${item.price.toLocaleString()}đ</td>
                            <td>${item.durationDays} ngày</td>
                            <td>
                                <button class="btn-edit-table" onclick='editPackage(${JSON.stringify(item)})'><i class="fas fa-edit"></i></button>
                                <button class="btn-delete-table" onclick="deletePackage(${item.id})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`;
                    } else if (type === 'history') {
                        html += `<tr>
                            <td>${new Date(item.checkInTime).toLocaleString('vi-VN')}</td>
                            <td>${item.userName}</td>
                            <td>${item.cardUid}</td>
                            <td><span class="${item.status === 'Thành công' ? 'status-valid' : 'status-invalid'}">${item.status}</span></td>
                        </tr>`;
                    }
                });
                tableBody.innerHTML = html;
            } catch (e) { console.error("Lỗi API:", e); }
        }

        async function cancelSubscription(userId) {
            const confirm = await Swal.fire({
                title: 'Xác nhận hủy gói?',
                text: "Hội viên sẽ mất quyền truy cập ngay lập tức!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff3e3e',
                confirmButtonText: 'Đồng ý hủy'
            });
            if (confirm.isConfirmed) {
                try {
                    await axios.delete(`${API_URL}/Subscription/cancel/${userId}`);
                    Swal.fire('Thành công', 'Đã hủy gói tập.', 'success');
                    loadTab('members');
                } catch (e) { Swal.fire('Lỗi', 'Không thể hủy gói!', 'error'); }
            }
        }

        async function toggleUser(id) {
            try {
                const res = await axios.post(`${API_URL}/Users/toggle-status/${id}`);
                Swal.fire({ title: 'Thông báo', text: res.data.message, icon: 'success', timer: 1000, showConfirmButton: false });
                loadTab('members');
            } catch (e) { Swal.fire('Lỗi', 'Thao tác thất bại!', 'error'); }
        }

        function openPackageModal() {
            document.getElementById('packageModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = "THÊM GÓI TẬP";
            document.getElementById('packageId').value = "";
            document.getElementById('packageName').value = "";
            document.getElementById('packagePrice').value = "";
            document.getElementById('packageDays').value = "";
        }

        async function savePackage() {
            const id = document.getElementById('packageId').value;
            const data = {
                name: document.getElementById('packageName').value,
                price: parseInt(document.getElementById('packagePrice').value),
                durationDays: parseInt(document.getElementById('packageDays').value)
            };
            try {
                if (id) await axios.put(`${API_URL}/GymPackage/${id}`, { id, ...data });
                else await axios.post(`${API_URL}/GymPackage`, data);
                closeModal('packageModal');
                loadTab('packages');
            } catch (e) { Swal.fire('Lỗi', 'Thao tác thất bại!', 'error'); }
        }

        async function deletePackage(id) {
            const confirm = await Swal.fire({ title: 'Xóa gói tập?', icon: 'warning', showCancelButton: true });
            if (confirm.isConfirmed) {
                await axios.delete(`${API_URL}/GymPackage/${id}`);
                loadTab('packages');
            }
        }

        function editPackage(item) {
            openPackageModal();
            document.getElementById('modalTitle').innerText = "SỬA GÓI TẬP";
            document.getElementById('packageId').value = item.id;
            document.getElementById('packageName').value = item.name;
            document.getElementById('packagePrice').value = item.price;
            document.getElementById('packageDays').value = item.durationDays;
        }

        async function openSubscribeModal(userId, fullName) {
            document.getElementById('subscribeModal').style.display = 'flex';
            document.getElementById('subMemberName').innerText = "Hội viên: " + fullName;
            document.getElementById('subUserId').value = userId;
            const res = await axios.get(`${API_URL}/GymPackage`);
            document.getElementById('subPackageSelect').innerHTML = res.data.map(p => `<option value="${p.id}">${p.name} - ${p.price.toLocaleString()}đ</option>`).join('');
        }

        async function confirmSubscribe() {
            const data = { userId: parseInt(document.getElementById('subUserId').value), gymPackageId: parseInt(document.getElementById('subPackageSelect').value) };
            try {
                await axios.post(`${API_URL}/Subscription/subscribe`, data);
                closeModal('subscribeModal');
                loadTab('members');
            } catch (e) { Swal.fire('Lỗi', 'Đăng ký thất bại!', 'error'); }
        }

        function searchTable() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let rows = document.getElementById("tableBody").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                let nameCol = rows[i].getElementsByTagName("td")[0];
                let userCol = rows[i].getElementsByTagName("td")[1];
                if (nameCol || userCol) {
                    let txtValue = (nameCol.textContent || nameCol.innerText) + (userCol.textContent || userCol.innerText);
                    rows[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }

        window.onload = () => loadTab('members');
    </script>
</body>

</html>
